name: verdict-branding

# Guards the VERDICT fork's branding: it must stay applied, idempotent, and
# type-clean. Runs on pushes/PRs that touch branded source or the rebrand tooling.
on:
  push:
    branches: [main]
    paths:
      - "packages/tui/src/**"
      - "packages/opencode/src/**"
      - "scripts/verdict-rebrand.sh"
      - ".verdict/assets/**"
      - ".github/workflows/verdict-branding.yml"
  pull_request:
    paths:
      - "packages/tui/src/**"
      - "packages/opencode/src/**"
      - "scripts/verdict-rebrand.sh"
      - ".verdict/assets/**"
  workflow_dispatch:

jobs:
  branding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Rebrand is idempotent (re-running makes no changes)
        run: |
          bash scripts/verdict-rebrand.sh
          if ! git diff --quiet -- packages/; then
            echo "::error::verdict-rebrand.sh is not idempotent — branding drifted. Diff:"
            git --no-pager diff -- packages/
            exit 1
          fi
          echo "Rebrand is idempotent."

      - name: Branding is present
        run: |
          test "$(grep -c VERDICT packages/tui/src/logo.ts)" -gt 0 || { echo "::error::logo not branded"; exit 1; }
          grep -q 'You are VERDICT' packages/opencode/src/session/prompt/gpt.txt || { echo "::error::agent persona not branded"; exit 1; }
          grep -q 'setTerminalTitle("VERDICT")' packages/tui/src/app.tsx || { echo "::error::terminal title not branded"; exit 1; }
          echo "Branding present."

      - name: Typecheck branded packages
        run: |
          bun run --cwd packages/tui typecheck
          bun run --cwd packages/opencode typecheck
